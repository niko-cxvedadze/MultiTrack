name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'instant.schema.ts'
      - 'instant.perms.ts'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.4'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push InstantDB schema
        run: npx instant-cli push schema --app ${{ secrets.INSTANT_APP_ID }} --token ${{ secrets.INSTANT_APP_ADMIN_TOKEN }} --yes
        env:
          INSTANT_CLI_AUTH_TOKEN: ${{ secrets.INSTANT_CLI_AUTH_TOKEN }}

      - name: Push InstantDB permissions
        run: npx instant-cli push perms --app ${{ secrets.INSTANT_APP_ID }} --token ${{ secrets.INSTANT_APP_ADMIN_TOKEN }} --yes
        env:
          INSTANT_CLI_AUTH_TOKEN: ${{ secrets.INSTANT_CLI_AUTH_TOKEN }}

      - name: Extract commit message
        id: commit
        run: echo "msg=$(git log -1 --pretty=%s | cut -c1-100)" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to Cloudflare Workers
        run: npx wrangler deploy --message "${{ steps.commit.outputs.msg }}"
        working-directory: apps/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
